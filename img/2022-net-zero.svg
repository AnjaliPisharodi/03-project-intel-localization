<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Net-zero by 2040</title>
  <desc id="desc">A bright circular zero wrapped in leaves and a clean skyline, representing Intel's net-zero commitment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071425"/>
      <stop offset="55%" stop-color="#0c4776"/>
      <stop offset="100%" stop-color="#19a1d5"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a9f3ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9ffd7"/>
      <stop offset="100%" stop-color="#45c96d"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#03111f" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="800" height="600" rx="36" fill="url(#bg)"/>
  <path d="M80 448c98-34 176-46 256-46 98 0 172 20 246 20 70 0 132-12 138-16v88H80z" fill="#0a243a" opacity="0.82"/>
  <g opacity="0.9" filter="url(#softShadow)">
    <rect x="118" y="336" width="82" height="110" rx="16" fill="#124d72"/>
    <rect x="214" y="308" width="56" height="138" rx="14" fill="#0b3554"/>
    <rect x="608" y="320" width="86" height="126" rx="16" fill="#115277"/>
    <rect x="690" y="344" width="26" height="102" rx="13" fill="#0b3554"/>
  </g>
  <circle cx="400" cy="286" r="148" fill="none" stroke="url(#ring)" stroke-width="24" opacity="0.92" filter="url(#softShadow)"/>
  <circle cx="400" cy="286" r="98" fill="none" stroke="#45c96d" stroke-width="28"/>
  <path d="M504 306c-18-4-36-13-50-26-16 38-44 64-84 76 18-60 62-102 134-128" fill="url(#leaf)" filter="url(#softShadow)"/>
  <path d="M414 312c30 4 52 18 70 42" fill="none" stroke="#0a243a" stroke-width="10" stroke-linecap="round"/>
  <path d="M382 188c-40 24-66 66-72 118" fill="none" stroke="#dff7ff" stroke-width="10" stroke-linecap="round" opacity="0.72"/>
  <g fill="#ffffff" opacity="0.92">
    <rect x="236" y="362" width="28" height="70" rx="8"/>
    <rect x="278" y="346" width="28" height="86" rx="8"/>
    <rect x="320" y="332" width="28" height="100" rx="8"/>
    <rect x="520" y="350" width="28" height="82" rx="8"/>
    <rect x="562" y="336" width="28" height="96" rx="8"/>
  </g>
  <text x="312" y="332" fill="#ffffff" font-family="Arial, sans-serif" font-size="74" font-weight="700">0</text>
  <text x="58" y="528" fill="#ffffff" font-family="Arial, sans-serif" font-size="52" font-weight="700">2022</text>
</svg>