<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Intel 386 processor</title>
  <desc id="desc">A cleaner Intel 386 chip on a copper-toned motherboard with centered title text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#29413f"/>
      <stop offset="100%" stop-color="#b9a38d"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f342a"/>
      <stop offset="100%" stop-color="#9b6d4e"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d6dfde"/>
      <stop offset="45%" stop-color="#8ca39d"/>
      <stop offset="100%" stop-color="#eff4f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1d1712" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="800" height="600" rx="34" fill="url(#bg)"/>
  <path d="M0 414c108-30 198-38 296-32 106 7 194 34 302 38 86 3 150-8 202-20v200H0z" fill="#5d4331" opacity="0.4"/>
  <g filter="url(#shadow)">
    <rect x="96" y="174" width="608" height="258" rx="26" fill="url(#board)"/>
    <path d="M126 216l516 0M126 260l516 0M126 304l516 0M126 348l516 0" stroke="#cfbea8" stroke-width="4" opacity="0.16"/>
    <rect x="252" y="192" width="300" height="216" rx="20" fill="#101410" opacity="0.34"/>
    <rect x="272" y="208" width="260" height="180" rx="16" fill="url(#chip)" stroke="#dfe8e5" stroke-width="8"/>
    <text x="402" y="236" text-anchor="middle" fill="#24352f" font-family="Times New Roman, serif" font-size="28" font-style="italic" font-weight="700">intel</text>
    <text x="402" y="298" text-anchor="middle" fill="#24352f" font-family="Times New Roman, serif" font-size="64" font-weight="700">386</text>
    <text x="402" y="336" text-anchor="middle" fill="#24352f" font-family="Times New Roman, serif" font-size="24">1985</text>
  </g>
  <g fill="#b8c3bb" filter="url(#shadow)">
    <rect x="190" y="214" width="16" height="20" rx="4"/>
    <rect x="190" y="248" width="16" height="20" rx="4"/>
    <rect x="190" y="282" width="16" height="20" rx="4"/>
    <rect x="190" y="316" width="16" height="20" rx="4"/>
    <rect x="598" y="214" width="16" height="20" rx="4"/>
    <rect x="598" y="248" width="16" height="20" rx="4"/>
    <rect x="598" y="282" width="16" height="20" rx="4"/>
    <rect x="598" y="316" width="16" height="20" rx="4"/>
  </g>
  <circle cx="642" cy="124" r="54" fill="#d8f5cb" opacity="0.26"/>
</svg>