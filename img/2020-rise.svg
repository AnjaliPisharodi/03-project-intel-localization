<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Intel RISE strategy</title>
  <desc id="desc">A layered sustainability scene with the RISE pillars rising above a city skyline and leaf-lit path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081424"/>
      <stop offset="50%" stop-color="#0f4e7a"/>
      <stop offset="100%" stop-color="#1db0da"/>
    </linearGradient>
    <linearGradient id="skyGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#03111f" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="800" height="600" rx="36" fill="url(#bg)"/>
  <circle cx="640" cy="116" r="88" fill="#fff8bf" opacity="0.9"/>
  <ellipse cx="640" cy="116" rx="120" ry="78" fill="url(#skyGlow)"/>
  <path d="M80 446c82-36 158-50 242-48 76 2 140 20 210 28 72 8 132 2 188-18v92H80z" fill="#0b243b" opacity="0.82"/>
  <g filter="url(#softShadow)">
    <rect x="126" y="314" width="98" height="132" rx="18" fill="#125275"/>
    <rect x="242" y="260" width="98" height="186" rx="18" fill="#14a0c9"/>
    <rect x="358" y="206" width="98" height="240" rx="18" fill="#ffffff"/>
    <rect x="474" y="278" width="98" height="168" rx="18" fill="#ffcf5a"/>
    <rect x="590" y="300" width="90" height="146" rx="18" fill="#1a658d"/>
  </g>
  <g fill="#0b243b" opacity="0.8">
    <rect x="148" y="350" width="18" height="96"/>
    <rect x="180" y="330" width="18" height="116"/>
    <rect x="264" y="302" width="18" height="134"/>
    <rect x="296" y="282" width="18" height="154"/>
    <rect x="380" y="252" width="18" height="184"/>
    <rect x="412" y="232" width="18" height="204"/>
