<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Intel 386 processor</title>
  <desc id="desc">A fast processor graphic with layered bars suggesting multitasking and performance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#041427"/>
      <stop offset="100%" stop-color="#1673b8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6bf0ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" rx="36" fill="url(#bg)"/>
  <circle cx="620" cy="118" r="76" fill="#7fe8ff" opacity="0.18"/>
  <rect x="188" y="154" width="424" height="292" rx="28" fill="#071224" stroke="#7fe8ff" stroke-width="10"/>
  <rect x="236" y="202" width="328" height="196" rx="20" fill="url(#glow)"/>
  <g fill="#1673b8">
    <rect x="280" y="250" width="42" height="84" rx="12"/>
    <rect x="346" y="230" width="42" height="104" rx="12"/>
    <rect x="412" y="210" width="42" height="124" rx="12"/>
    <rect x="478" y="240" width="42" height="94" rx="12"/>
  </g>
  <g fill="#7fe8ff" opacity="0.95">
    <rect x="246" y="182" width="18" height="40" rx="9"/>
    <rect x="286" y="182" width="18" height="40" rx="9"/>
    <rect x="326" y="182" width="18" height="40" rx="9"/>
    <rect x="366" y="182" width="18" height="40" rx="9"/>
    <rect x="406" y="182" width="18" height="40" rx="9"/>
    <rect x="446" y="182" width="18" height="40" rx="9"/>
    <rect x="486" y="182" width="18" height="40" rx="9"/>
    <rect x="526" y="182" width="18" height="40" rx="9"/>
  </g>
  <text x="336" y="286" fill="#041427" font-family="Arial, sans-serif" font-size="84" font-weight="700">386</text>
  <text x="58" y="528" fill="#ffffff" font-family="Arial, sans-serif" font-size="52" font-weight="700">1985</text>
</svg>