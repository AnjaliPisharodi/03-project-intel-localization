<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Peak greenhouse gas emissions in 2006</title>
  <desc id="desc">A realistic industrial skyline and a glowing emissions graph that peaks and then drops.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#152433"/>
      <stop offset="50%" stop-color="#4d6a8c"/>
      <stop offset="100%" stop-color="#aab7c4"/>
    </linearGradient>
    <linearGradient id="smoke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f6f9" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f2f6f9" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#09121a" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="800" height="600" rx="34" fill="url(#bg)"/>
  <rect x="0" y="430" width="800" height="170" fill="#1d2d3f" opacity="0.72"/>
  <path d="M88 416c78-20 154-30 236-28 86 3 168 20 260 24 84 4 150-6 188-18v90H88z" fill="#3e556d" opacity="0.36"/>
  <g filter="url(#shadow)">
    <rect x="106" y="294" width="124" height="126" rx="10" fill="#2a3c4d"/>
    <rect x="148" y="240" width="20" height="180" rx="10" fill="#22303f"/>
    <rect x="250" y="310" width="160" height="112" rx="10" fill="#263748"/>
    <rect x="442" y="286" width="126" height="136" rx="10" fill="#32485b"/>
    <rect x="588" y="304" width="126" height="118" rx="10" fill="#263748"/>
    <path d="M118 310h100M118 338h100M118 366h100M118 394h100" stroke="#8fb0c2" stroke-width="4" opacity="0.32"/>
  </g>
  <ellipse cx="138" cy="156" rx="58" ry="38" fill="url(#smoke)"/>
  <ellipse cx="184" cy="132" rx="78" ry="50" fill="url(#smoke)"/>
  <ellipse cx="226" cy="160" rx="64" ry="42" fill="url(#smoke)"/>
  <path d="M104 398L220 350L330 206L430 250L540 312L668 366" fill="none" stroke="#bff5ff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>
  <circle cx="330" cy="206" r="22" fill="#ffd66e" filter="url(#shadow)"/>
  <path d="M330 186c16 6 28 18 32 36" fill="none" stroke="#fff4c5" stroke-width="7" stroke-linecap="round"/>
  <text x="58" y="528" fill="#ffffff" font-family="Times New Roman, serif" font-size="52" font-weight="700">2006</text>
</svg>