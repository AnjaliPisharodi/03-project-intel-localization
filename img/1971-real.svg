<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">First Intel microprocessor</title>
  <desc id="desc">A close-up laboratory scene of the first microprocessor chip lit with cool metal reflections and circuitry.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#152536"/>
      <stop offset="55%" stop-color="#5f8ba9"/>
      <stop offset="100%" stop-color="#c7d7df"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#23485d"/>
      <stop offset="100%" stop-color="#7b9aa8"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8c6d0"/>
      <stop offset="40%" stop-color="#eff6fb"/>
      <stop offset="100%" stop-color="#728da0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#08111a" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="800" height="600" rx="34" fill="url(#bg)"/>
  <path d="M0 430c100-34 180-44 286-36 122 10 218 40 324 44 80 3 146-8 190-22v184H0z" fill="#102030" opacity="0.64"/>
