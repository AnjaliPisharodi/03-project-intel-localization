    <rect x="270" y="220" width="260" height="178" rx="18" fill="#101a24" stroke="#9fb0bd" stroke-width="10"/>
    <rect x="304" y="254" width="192" height="110" rx="12" fill="url(#chip)"/>
    <text x="326" y="304" fill="#173142" font-family="Times New Roman, serif" font-size="26" font-weight="700">Intel 4004</text>
    <text x="341" y="336" fill="#173142" font-family="Times New Roman, serif" font-size="22">1971</text>
